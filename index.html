<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Богатство, Бессмертие, Любовь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0d0b1a, #04030a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }

        .container {
            position: relative;
            width: 800px;
            max-width: 100%;
            height: 600px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .card {
            position: absolute;
            padding: 20px 32px;
            border-radius: 60px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: grab;
            transition: box-shadow 0.25s, transform 0.15s;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
            will-change: transform, left, top;
            background: rgba(20, 18, 40, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .card:active {
            cursor: grabbing;
            transform: scale(0.96);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }

        .card .emoji {
            font-size: 36px;
        }

        /* Богатство */
        #wealth {
            top: 80px;
            left: 80px;
            background: linear-gradient(145deg, #f9d976, #f39c12);
            color: #1f1a2b;
            border-color: #f1c40f;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.25);
        }

        /* Бессмертие */
        #immortality {
            top: 80px;
            right: 80px;
            background: linear-gradient(145deg, #a8e6ff, #4facfe);
            color: #0b1a2b;
            border-color: #4facfe;
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.25);
        }

        /* Любовь (кнопка-переключатель) */
        #love {
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(145deg, #ff7eb3, #ff4d7a);
            color: #fff;
            border-color: #ff4d7a;
            box-shadow: 0 0 40px rgba(255, 77, 122, 0.35);
            cursor: pointer;
            padding: 16px 40px;
            font-size: 30px;
            z-index: 20;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #love:hover {
            transform: translateX(-50%) scale(1.04);
            box-shadow: 0 0 60px rgba(255, 77, 122, 0.6);
        }

        #love:active {
            transform: translateX(-50%) scale(0.94);
        }

        /* Анимация возврата */
        .returning {
            transition: left 0.8s cubic-bezier(0.34, 1.56, 0.64, 1),
                top 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
        }

        /* Подпись под любовью */
        .love-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            z-index: 0;
            pointer-events: none;
            white-space: nowrap;
        }

        /* Адаптив */
        @media (max-width: 700px) {
            .container {
                height: 500px;
            }
            .card {
                font-size: 22px;
                padding: 14px 24px;
            }
            .card .emoji {
                font-size: 28px;
            }
            #love {
                font-size: 24px;
                padding: 12px 28px;
                bottom: 60px;
            }
            #wealth {
                top: 40px;
                left: 30px;
            }
            #immortality {
                top: 40px;
                right: 30px;
            }
            .love-hint {
                bottom: 18px;
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .container {
                height: 400px;
                border-radius: 28px;
            }
            .card {
                font-size: 18px;
                padding: 10px 18px;
                border-radius: 40px;
            }
            .card .emoji {
                font-size: 22px;
            }
            #love {
                font-size: 20px;
                padding: 10px 20px;
                bottom: 50px;
            }
            #wealth {
                top: 30px;
                left: 20px;
            }
            #immortality {
                top: 30px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <!-- Богатство -->
        <div class="card" id="wealth">
            <span class="emoji">💰</span> Богатство
        </div>

        <!-- Бессмертие -->
        <div class="card" id="immortality">
            <span class="emoji">♾️</span> Бессмертие
        </div>

        <!-- Любовь (кнопка возврата) -->
        <div class="card" id="love">
            <span class="emoji">❤️</span> Любовь
        </div>

        <div class="love-hint">• нажми, чтобы вернуть всё на место •</div>
    </div>

    <script>
        (function() {
            const container = document.getElementById('container');
            const wealth = document.getElementById('wealth');
            const immortality = document.getElementById('immortality');
            const loveBtn = document.getElementById('love');

            // Храним начальные позиции (в процентах от размеров контейнера)
            // чтобы возвращать с учётом ресайза
            let initialPos = {};

            function saveInitialPositions() {
                const rect = container.getBoundingClientRect();
                // wealth
                const wRect = wealth.getBoundingClientRect();
                initialPos.wealth = {
                    left: (wRect.left - rect.left) / rect.width * 100,
                    top: (wRect.top - rect.top) / rect.height * 100,
                };
                // immortality
                const iRect = immortality.getBoundingClientRect();
                initialPos.immortality = {
                    left: (iRect.left - rect.left) / rect.width * 100,
                    top: (iRect.top - rect.top) / rect.height * 100,
                };
                // love не перемещается, не сохраняем
            }

            // Устанавливаем позиции из процентов
            function setElementPosition(el, pos) {
                el.style.left = pos.left + '%';
                el.style.top = pos.top + '%';
                // убираем right если был
                el.style.right = 'auto';
            }

            // Возвращаем wealth и immortality на исходные позиции с анимацией
            function returnToStart() {
                // Добавляем класс для анимации
                wealth.classList.add('returning');
                immortality.classList.add('returning');

                setElementPosition(wealth, initialPos.wealth);
                setElementPosition(immortality, initialPos.immortality);

                // Убираем класс после окончания анимации, чтобы не мешать перетаскиванию
                setTimeout(() => {
                    wealth.classList.remove('returning');
                    immortality.classList.remove('returning');
                }, 900);
            }

            // Сохраняем начальные позиции после загрузки и при ресайзе
            function updateInitialPositions() {
                saveInitialPositions();
                // также применяем их, чтобы при ресайзе элементы не сбивались
                // но если они уже были перемещены, мы не хотим сбрасывать их позиции,
                // только сохраняем новые "начальные" координаты для будущего возврата.
                // Однако при первом запуске нужно установить их в эти позиции.
                // Проверим, если у элементов ещё нет стилей left/top, установим.
                if (!wealth.style.left && !wealth.style.top) {
                    setElementPosition(wealth, initialPos.wealth);
                }
                if (!immortality.style.left && !immortality.style.top) {
                    setElementPosition(immortality, initialPos.immortality);
                }
            }

            // Перетаскивание (dragging) для wealth и immortality
            function makeDraggable(element) {
                let isDragging = false;
                let startX, startY, startLeft, startTop;

                const onStart = (e) => {
                    // если нажата не левая кнопка мыши
                    if (e.type === 'mousedown' && e.button !== 0) return;
                    // запрещаем перетаскивание, если элемент в процессе возврата
                    if (element.classList.contains('returning')) return;

                    isDragging = true;
                    const rect = container.getBoundingClientRect();
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    if (clientX == null) return;

                    const elRect = element.getBoundingClientRect();
                    startX = clientX - elRect.left;
                    startY = clientY - elRect.top;

                    // текущие позиции в пикселях относительно контейнера
                    const containerRect = container.getBoundingClientRect();
                    const leftPx = elRect.left - containerRect.left;
                    const topPx = elRect.top - containerRect.top;
                    // сохраняем их в процентах
                    startLeft = (leftPx / containerRect.width) * 100;
                    startTop = (topPx / containerRect.height) * 100;

                    element.style.transition = 'none'; // убираем анимацию при перетаскивании
                    element.style.cursor = 'grabbing';
                    element.classList.remove('returning');

                    e.preventDefault();
                };

                const onMove = (e) => {
                    if (!isDragging) return;
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    if (clientX == null) return;

                    const containerRect = container.getBoundingClientRect();
                    // вычисляем новые проценты
                    let newLeftPx = clientX - containerRect.left - startX;
                    let newTopPx = clientY - containerRect.top - startY;

                    // ограничиваем, чтобы не выходил за пределы контейнера (с учётом размеров элемента)
                    const elWidth = element.offsetWidth;
                    const elHeight = element.offsetHeight;
                    const maxLeft = containerRect.width - elWidth;
                    const maxTop = containerRect.height - elHeight;
                    newLeftPx = Math.min(Math.max(newLeftPx, 0), maxLeft);
                    newTopPx = Math.min(Math.max(newTopPx, 0), maxTop);

                    const newLeft = (newLeftPx / containerRect.width) * 100;
                    const newTop = (newTopPx / containerRect.height) * 100;

                    element.style.left = newLeft + '%';
                    element.style.top = newTop + '%';
                    element.style.right = 'auto';

                    e.preventDefault();
                };

                const onEnd = () => {
                    if (isDragging) {
                        isDragging = false;
                        element.style.cursor = 'grab';
                        element.style.transition = ''; // восстанавливаем
                    }
                };

                // Мышь
                element.addEventListener('mousedown', onStart);
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onEnd);

                // Тач
                element.addEventListener('touchstart', onStart, { passive: false });
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('touchend', onEnd);
                document.addEventListener('touchcancel', onEnd);
            }

            // Инициализация
            function init() {
                // Делаем перетаскиваемыми
                makeDraggable(wealth);
                makeDraggable(immortality);

                // Сохраняем начальные позиции
                updateInitialPositions();

                // При клике на любовь возвращаем
                loveBtn.addEventListener('click', returnToStart);

                // При ресайзе обновляем начальные позиции (но не сбрасываем текущие)
                window.addEventListener('resize', () => {
                    // обновляем сохранённые позиции (чтобы возврат работал корректно)
                    saveInitialPositions();
                });
            }

            // Ждём загрузки
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
